<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Calendar</title>
    <style>
        :root {
            --bg: #f0f4f8;
            --card-bg: #ffffff;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --today-bg: #eef2ff;
            --today-ring: #4f46e5;
            --event-work: #3b82f6;
            --event-personal: #f59e0b;
            --event-important: #ef4444;
            --event-other: #10b981;
            --shadow: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-lg: 0 10px 25px rgba(0, 0, 0, 0.1), 0 4px 10px rgba(0, 0, 0, 0.06);
            --radius: 12px;
            --transition: 0.2s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }

        .app-container {
            width: 100%;
            max-width: 900px;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 90vh;
            max-height: 850px;
        }

        /* HEADER */
        .calendar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 12px;
            background: #fafbfc;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.3rem;
        }
        .logo-text {
            font-weight: 700;
            font-size: 1.3rem;
            letter-spacing: -0.3px;
        }

        .nav-area {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .nav-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: white;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            color: var(--text);
        }
        .nav-btn:hover {
            background: #f1f5f9;
            border-color: #cbd5e1;
        }
        .month-year-display {
            font-weight: 600;
            font-size: 1.05rem;
            min-width: 150px;
            text-align: center;
            letter-spacing: -0.2px;
        }
        .today-btn {
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: white;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.85rem;
            transition: var(--transition);
            color: var(--text);
            white-space: nowrap;
        }
        .today-btn:hover {
            background: #f1f5f9;
            border-color: #cbd5e1;
        }

        .view-toggle {
            display: flex;
            background: #f1f5f9;
            border-radius: 20px;
            padding: 3px;
        }
        .view-toggle button {
            padding: 7px 16px;
            border-radius: 18px;
            border: none;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.85rem;
            transition: var(--transition);
            background: transparent;
            color: var(--text-light);
        }
        .view-toggle button.active {
            background: white;
            color: var(--text);
            box-shadow: var(--shadow);
            font-weight: 600;
        }

        /* CALENDAR GRID */
        .calendar-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 8px 16px 16px;
            overflow: hidden;
        }

        .day-names {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-weight: 600;
            font-size: 0.8rem;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.4px;
            padding: 8px 0;
        }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            grid-template-rows: repeat(6, 1fr);
            gap: 3px;
            flex: 1;
            min-height: 0;
        }

        .day-cell {
            position: relative;
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 4px 2px;
            min-height: 0;
            overflow: hidden;
            border: 2px solid transparent;
            background: #fafbfc;
        }
        .day-cell:hover {
            background: #f1f5f9;
            border-color: #e2e8f0;
        }
        .day-cell.other-month {
            opacity: 0.35;
            pointer-events: none;
        }
        .day-cell.today {
            background: var(--today-bg);
            border-color: var(--today-ring);
            font-weight: 700;
        }
        .day-cell.selected {
            background: #e0e7ff;
            border-color: #818cf8;
        }
        .day-number {
            font-size: 0.85rem;
            font-weight: 500;
            z-index: 1;
            line-height: 1;
            margin-bottom: 2px;
        }
        .today .day-number {
            background: var(--today-ring);
            color: white;
            border-radius: 50%;
            width: 26px;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .event-dots {
            display: flex;
            gap: 2px;
            flex-wrap: wrap;
            justify-content: center;
            z-index: 1;
            max-width: 90%;
            overflow: hidden;
        }
        .event-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .event-dot.work {
            background: var(--event-work);
        }
        .event-dot.personal {
            background: var(--event-personal);
        }
        .event-dot.important {
            background: var(--event-important);
        }
        .event-dot.other {
            background: var(--event-other);
        }
        .more-events {
            font-size: 0.6rem;
            color: var(--text-light);
            font-weight: 600;
            z-index: 1;
        }

        /* WEEK VIEW */
        .week-view-container {
            display: none;
            flex: 1;
            flex-direction: column;
            overflow-y: auto;
            gap: 4px;
            padding: 4px 0;
        }
        .week-view-container.active {
            display: flex;
        }
        .days-grid.active {
            display: grid;
        }
        .week-row {
            display: flex;
            align-items: stretch;
            border-radius: 8px;
            overflow: hidden;
            min-height: 60px;
            background: #fafbfc;
            transition: var(--transition);
            cursor: pointer;
        }
        .week-row:hover {
            background: #f1f5f9;
        }
        .week-row.today-row {
            background: var(--today-bg);
            border: 1px solid var(--today-ring);
        }
        .week-date-col {
            width: 55px;
            min-width: 55px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            border-right: 1px solid var(--border);
            padding: 4px;
            font-size: 0.8rem;
            text-align: center;
        }
        .week-date-col .week-day-name {
            font-size: 0.7rem;
            color: var(--text-light);
            text-transform: uppercase;
        }
        .week-date-col .week-day-num {
            font-size: 1.3rem;
            font-weight: 700;
        }
        .today-row .week-date-col .week-day-num {
            background: var(--today-ring);
            color: white;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .week-events-col {
            flex: 1;
            padding: 6px 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            align-items: center;
            overflow: hidden;
        }
        .week-event-chip {
            font-size: 0.7rem;
            padding: 3px 8px;
            border-radius: 12px;
            white-space: nowrap;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            max-width: 180px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .week-event-chip:hover {
            filter: brightness(0.9);
            transform: scale(1.03);
        }
        .week-event-chip.work {
            background: #dbeafe;
            color: #1d4ed8;
        }
        .week-event-chip.personal {
            background: #fef3c7;
            color: #b45309;
        }
        .week-event-chip.important {
            background: #fce7f3;
            color: #be123c;
        }
        .week-event-chip.other {
            background: #d1fae5;
            color: #047857;
        }

        /* SIDEBAR / EVENT LIST */
        .sidebar {
            border-top: 1px solid var(--border);
            padding: 16px 20px;
            background: #fafbfc;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 200px;
            overflow-y: auto;
        }
        .sidebar h3 {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .sidebar h3 .count-badge {
            background: var(--primary);
            color: white;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 700;
        }
        .event-list-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid transparent;
            font-size: 0.85rem;
        }
        .event-list-item:hover {
            border-color: #cbd5e1;
            box-shadow: var(--shadow);
        }
        .event-color-indicator {
            width: 4px;
            height: 28px;
            border-radius: 2px;
            flex-shrink: 0;
        }
        .event-color-indicator.work {
            background: var(--event-work);
        }
        .event-color-indicator.personal {
            background: var(--event-personal);
        }
        .event-color-indicator.important {
            background: var(--event-important);
        }
        .event-color-indicator.other {
            background: var(--event-other);
        }
        .event-info {
            flex: 1;
            min-width: 0;
        }
        .event-info .event-title {
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .event-info .event-date {
            font-size: 0.7rem;
            color: var(--text-light);
        }
        .delete-event-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            opacity: 0.4;
            transition: var(--transition);
            padding: 4px;
            border-radius: 4px;
        }
        .delete-event-btn:hover {
            opacity: 1;
            background: #fee2e2;
            color: #ef4444;
        }

        /* MODAL */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.5);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .modal {
            background: white;
            border-radius: 16px;
            padding: 24px;
            width: 90%;
            max-width: 440px;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.25s ease;
        }
        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        .modal h3 {
            margin-bottom: 16px;
            font-size: 1.1rem;
            font-weight: 700;
        }
        .form-group {
            margin-bottom: 12px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.8rem;
            margin-bottom: 4px;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            font-size: 0.9rem;
            font-family: inherit;
            transition: var(--transition);
            background: #fafbfc;
        }
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
            background: white;
        }
        .modal-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 18px;
        }
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: var(--transition);
            font-family: inherit;
        }
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        .btn-primary:hover {
            background: var(--primary-hover);
        }
        .btn-secondary {
            background: #f1f5f9;
            color: var(--text);
        }
        .btn-secondary:hover {
            background: #e2e8f0;
        }
        .btn-danger {
            background: #fef2f2;
            color: #dc2626;
        }
        .btn-danger:hover {
            background: #fee2e2;
        }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            font-weight: 500;
            font-size: 0.85rem;
            z-index: 200;
            animation: toastIn 0.3s ease, toastOut 0.3s ease 1.7s forwards;
            pointer-events: none;
        }
        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
        @keyframes toastOut {
            from {
                opacity: 1;
            }
            to {
                opacity: 0;
                transform: translateX(-50%) translateY(-10px);
            }
        }

        /* RESPONSIVE */
        @media (max-width: 640px) {
            .app-container {
                height: 95vh;
                max-height: none;
                border-radius: 12px;
            }
            .calendar-header {
                padding: 12px 14px;
                gap: 8px;
            }
            .month-year-display {
                font-size: 0.9rem;
                min-width: 120px;
            }
            .nav-btn {
                width: 30px;
                height: 30px;
                font-size: 0.8rem;
            }
            .today-btn {
                padding: 6px 12px;
                font-size: 0.75rem;
            }
            .view-toggle button {
                padding: 5px 10px;
                font-size: 0.75rem;
            }
            .day-number {
                font-size: 0.7rem;
            }
            .today .day-number {
                width: 22px;
                height: 22px;
            }
            .event-dot {
                width: 4px;
                height: 4px;
            }
            .sidebar {
                padding: 10px 12px;
                max-height: 150px;
            }
            .modal {
                width: 95%;
                padding: 18px;
                border-radius: 12px;
            }
            .week-date-col {
                width: 42px;
                min-width: 42px;
            }
            .week-date-col .week-day-num {
                font-size: 1rem;
            }
            .today-row .week-date-col .week-day-num {
                width: 26px;
                height: 26px;
            }
            .week-event-chip {
                font-size: 0.65rem;
                padding: 2px 6px;
                max-width: 100px;
            }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- HEADER -->
        <div class="calendar-header">
            <div class="logo-area">
                <div class="logo-icon">📅</div>
                <span class="logo-text">Calendar</span>
            </div>
            <div class="nav-area">
                <button class="nav-btn" id="prevBtn" title="Previous">◀</button>
                <span class="month-year-display" id="monthYearDisplay"></span>
                <button class="nav-btn" id="nextBtn" title="Next">▶</button>
                <button class="today-btn" id="todayBtn">Today</button>
            </div>
            <div class="view-toggle">
                <button id="monthViewBtn" class="active">Month</button>
                <button id="weekViewBtn">Week</button>
            </div>
        </div>

        <!-- CALENDAR BODY -->
        <div class="calendar-body">
            <!-- Month View -->
            <div class="day-names" id="dayNames">
                <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
            </div>
            <div class="days-grid active" id="daysGrid"></div>
            <!-- Week View -->
            <div class="week-view-container" id="weekViewContainer"></div>
        </div>

        <!-- SIDEBAR -->
        <div class="sidebar" id="sidebar">
            <h3>📋 Upcoming Events <span class="count-badge" id="eventCount">0</span></h3>
            <div id="eventList"></div>
        </div>
    </div>

    <!-- MODAL -->
    <div class="modal-overlay" id="modalOverlay" style="display:none;">
        <div class="modal">
            <h3 id="modalTitle">Add Event</h3>
            <div class="form-group">
                <label>Event Title</label>
                <input type="text" id="eventTitleInput" placeholder="Enter event name..." maxlength="50">
            </div>
            <div class="form-group">
                <label>Category</label>
                <select id="eventCategorySelect">
                    <option value="work">🔵 Work</option>
                    <option value="personal">🟡 Personal</option>
                    <option value="important">🔴 Important</option>
                    <option value="other">🟢 Other</option>
                </select>
            </div>
            <div class="form-group">
                <label>Date</label>
                <input type="date" id="eventDateInput">
            </div>
            <input type="hidden" id="editEventId">
            <div class="modal-actions">
                <button class="btn btn-danger" id="deleteEventBtn" style="display:none;">Delete</button>
                <button class="btn btn-secondary" id="cancelBtn">Cancel</button>
                <button class="btn btn-primary" id="saveEventBtn">Save Event</button>
            </div>
        </div>
    </div>

    <!-- TOAST -->
    <div id="toast" class="toast" style="display:none;"></div>

    <script>
        (function() {
            // --- STATE ---
            let currentDate = new Date();
            let selectedDate = null;
            let viewMode = 'month'; // 'month' | 'week'
            let events = []; // { id, title, category, date: 'YYYY-MM-DD' }
            let editingEventId = null;

            // --- DOM REFS ---
            const monthYearDisplay = document.getElementById('monthYearDisplay');
            const daysGrid = document.getElementById('daysGrid');
            const weekViewContainer = document.getElementById('weekViewContainer');
            const dayNames = document.getElementById('dayNames');
            const eventList = document.getElementById('eventList');
            const eventCount = document.getElementById('eventCount');
            const modalOverlay = document.getElementById('modalOverlay');
            const modalTitle = document.getElementById('modalTitle');
            const eventTitleInput = document.getElementById('eventTitleInput');
            const eventCategorySelect = document.getElementById('eventCategorySelect');
            const eventDateInput = document.getElementById('eventDateInput');
            const editEventIdInput = document.getElementById('editEventId');
            const deleteEventBtn = document.getElementById('deleteEventBtn');
            const saveEventBtn = document.getElementById('saveEventBtn');
            const cancelBtn = document.getElementById('cancelBtn');
            const toast = document.getElementById('toast');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const todayBtn = document.getElementById('todayBtn');
            const monthViewBtn = document.getElementById('monthViewBtn');
            const weekViewBtn = document.getElementById('weekViewBtn');

            // --- LOAD FROM LOCAL STORAGE ---
            function loadEvents() {
                try {
                    const stored = localStorage.getItem('calendar_events');
                    if (stored) {
                        events = JSON.parse(stored);
                    }
                } catch (e) {
                    events = [];
                }
            }

            function saveEvents() {
                localStorage.setItem('calendar_events', JSON.stringify(events));
            }

            // --- HELPERS ---
            function formatDate(date) {
                const y = date.getFullYear();
                const m = String(date.getMonth() + 1).padStart(2, '0');
                const d = String(date.getDate()).padStart(2, '0');
                return `${y}-${m}-${d}`;
            }

            function getEventsForDate(dateStr) {
                return events.filter(e => e.date === dateStr);
            }

            function getMonthName(month) {
                return ['January', 'February', 'March', 'April', 'May', 'June',
                    'July', 'August', 'September', 'October', 'November', 'December'
                ][month];
            }

            function showToast(msg) {
                toast.textContent = msg;
                toast.style.display = 'block';
                toast.style.animation = 'none';
                void toast.offsetWidth;
                toast.style.animation = 'toastIn 0.3s ease, toastOut 0.3s ease 1.7s forwards';
                setTimeout(() => { toast.style.display = 'none'; }, 2100);
            }

            // --- RENDER ---
            function renderMonthView() {
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();
                monthYearDisplay.textContent = `${getMonthName(month)} ${year}`;

                const firstDay = new Date(year, month, 1).getDay();
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const daysInPrevMonth = new Date(year, month, 0).getDate();

                const todayStr = formatDate(new Date());
                const selectedStr = selectedDate ? formatDate(selectedDate) : null;

                let html = '';
                const totalCells = 42; // 6 rows * 7 cols
                for (let i = 0; i < totalCells; i++) {
                    let dayNum, dateStr, isOtherMonth = false;
                    if (i < firstDay) {
                        // previous month
                        dayNum = daysInPrevMonth - firstDay + i + 1;
                        const d = new Date(year, month - 1, dayNum);
                        dateStr = formatDate(d);
                        isOtherMonth = true;
                    } else if (i - firstDay >= daysInMonth) {
                        // next month
                        dayNum = i - firstDay - daysInMonth + 1;
                        const d = new Date(year, month + 1, dayNum);
                        dateStr = formatDate(d);
                        isOtherMonth = true;
                    } else {
                        dayNum = i - firstDay + 1;
                        const d = new Date(year, month, dayNum);
                        dateStr = formatDate(d);
                    }

                    const dayEvents = getEventsForDate(dateStr);
                    const isToday = dateStr === todayStr;
                    const isSelected = dateStr === selectedStr;

                    let classes = 'day-cell';
                    if (isOtherMonth) classes += ' other-month';
                    if (isToday) classes += ' today';
                    if (isSelected && !isToday) classes += ' selected';
                    if (isSelected && isToday) classes += ' selected';

                    let dotsHtml = '';
                    const maxDots = 4;
                    const shownEvents = dayEvents.slice(0, maxDots);
                    dotsHtml = shownEvents.map(e => `<span class="event-dot ${e.category}"></span>`).join(
                    '');
                    if (dayEvents.length > maxDots) {
                        dotsHtml +=
                            `<span class="more-events">+${dayEvents.length - maxDots}</span>`;
                    }

                    html += `
                    <div class="${classes}" data-date="${dateStr}" title="${dayEvents.map(e=>e.title).join(', ') || 'No events'}">
                        <span class="day-number">${dayNum}</span>
                        <div class="event-dots">${dotsHtml}</div>
                    </div>`;
                }

                daysGrid.innerHTML = html;
                daysGrid.style.display = 'grid';
                daysGrid.classList.add('active');
                weekViewContainer.classList.remove('active');
                dayNames.style.display = 'grid';
            }

            function renderWeekView() {
                const today = new Date();
                // Find the Sunday of the current week
                const dayOfWeek = currentDate.getDay();
                const sunday = new Date(currentDate);
                sunday.setDate(currentDate.getDate() - dayOfWeek);

                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();
                monthYearDisplay.textContent =
                    `${getMonthName(month)} ${year} — Week of ${sunday.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}`;

                const todayStr = formatDate(today);
                let html = '';

                for (let i = 0; i < 7; i++) {
                    const d = new Date(sunday);
                    d.setDate(sunday.getDate() + i);
                    const dateStr = formatDate(d);
                    const dayEvents = getEventsForDate(dateStr);
                    const isToday = dateStr === todayStr;
                    const dayName = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'][i];

                    let chipsHtml = dayEvents.map(e =>
                        `<span class="week-event-chip ${e.category}" data-event-id="${e.id}" title="${e.title}">${e.title}</span>`
                    ).join('');
                    if (dayEvents.length === 0) {
                        chipsHtml = '<span style="color:#94a3b8;font-size:0.7rem;">No events</span>';
                    }

                    html += `
                    <div class="week-row ${isToday ? 'today-row' : ''}" data-date="${dateStr}">
                        <div class="week-date-col">
                            <span class="week-day-name">${dayName}</span>
                            <span class="week-day-num">${d.getDate()}</span>
                        </div>
                        <div class="week-events-col">${chipsHtml}</div>
                    </div>`;
                }

                weekViewContainer.innerHTML = html;
                weekViewContainer.classList.add('active');
                daysGrid.style.display = 'none';
                daysGrid.classList.remove('active');
                dayNames.style.display = 'none';
            }

            function renderSidebar() {
                const todayStr = formatDate(new Date());
                const upcoming = events
                    .filter(e => e.date >= todayStr)
                    .sort((a, b) => a.date.localeCompare(b.date))
                    .slice(0, 15);

                eventCount.textContent = upcoming.length;

                if (upcoming.length === 0) {
                    eventList.innerHTML =
                        '<div style="color:#94a3b8;font-size:0.8rem;padding:8px;">No upcoming events. Click a day to add one!</div>';
                    return;
                }

                eventList.innerHTML = upcoming.map(e => {
                    const d = new Date(e.date + 'T00:00:00');
                    const dateLabel = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short',
                        day: 'numeric' });
                    return `
                    <div class="event-list-item" data-event-id="${e.id}">
                        <span class="event-color-indicator ${e.category}"></span>
                        <div class="event-info">
                            <div class="event-title">${escapeHtml(e.title)}</div>
                            <div class="event-date">${dateLabel}</div>
                        </div>
                        <button class="delete-event-btn" data-delete-id="${e.id}" title="Delete event">✕</button>
                    </div>`;
                }).join('');
            }

            function escapeHtml(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            function renderAll() {
                if (viewMode === 'month') {
                    renderMonthView();
                } else {
                    renderWeekView();
                }
                renderSidebar();
            }

            // --- NAVIGATION ---
            function navigateMonth(delta) {
                currentDate.setMonth(currentDate.getMonth() + delta);
                selectedDate = null;
                renderAll();
            }

            function navigateWeek(delta) {
                currentDate.setDate(currentDate.getDate() + delta * 7);
                selectedDate = null;
                renderAll();
            }

            function goToToday() {
                currentDate = new Date();
                selectedDate = new Date();
                renderAll();
            }

            // --- EVENT CRUD ---
            function openAddModal(dateStr) {
                editingEventId = null;
                editEventIdInput.value = '';
                modalTitle.textContent = 'Add Event';
                eventTitleInput.value = '';
                eventCategorySelect.value = 'work';
                eventDateInput.value = dateStr;
                deleteEventBtn.style.display = 'none';
                saveEventBtn.textContent = 'Save Event';
                modalOverlay.style.display = 'flex';
                eventTitleInput.focus();
            }

            function openEditModal(eventId) {
                const ev = events.find(e => e.id === eventId);
                if (!ev) return;
                editingEventId = eventId;
                editEventIdInput.value = eventId;
                modalTitle.textContent = 'Edit Event';
                eventTitleInput.value = ev.title;
                eventCategorySelect.value = ev.category;
                eventDateInput.value = ev.date;
                deleteEventBtn.style.display = 'inline-block';
                saveEventBtn.textContent = 'Update Event';
                modalOverlay.style.display = 'flex';
                eventTitleInput.focus();
            }

            function closeModal() {
                modalOverlay.style.display = 'none';
                editingEventId = null;
                editEventIdInput.value = '';
                eventTitleInput.value = '';
            }

            function saveEvent() {
                const title = eventTitleInput.value.trim();
                const category = eventCategorySelect.value;
                const date = eventDateInput.value;

                if (!title) {
                    showToast('Please enter an event title.');
                    eventTitleInput.focus();
                    return;
                }
                if (!date) {
                    showToast('Please select a date.');
                    return;
                }

                if (editingEventId) {
                    // Update
                    const idx = events.findIndex(e => e.id === editingEventId);
                    if (idx >= 0) {
                        events[idx].title = title;
                        events[idx].category = category;
                        events[idx].date = date;
                    }
                    showToast('Event updated! ✅');
                } else {
                    // Add
                    const newEvent = {
                        id: Date.now().toString() + Math.random().toString(36).substr(2, 5),
                        title,
                        category,
                        date,
                    };
                    events.push(newEvent);
                    showToast('Event added! 🎉');
                }

                saveEvents();
                closeModal();
                renderAll();
            }

            function deleteEvent(eventId) {
                if (!confirm('Are you sure you want to delete this event?')) return;
                events = events.filter(e => e.id !== eventId);
                saveEvents();
                closeModal();
                renderAll();
                showToast('Event deleted.');
            }

            // --- EVENT LISTENERS ---
            prevBtn.addEventListener('click', () => {
                if (viewMode === 'month') navigateMonth(-1);
                else navigateWeek(-1);
            });
            nextBtn.addEventListener('click', () => {
                if (viewMode === 'month') navigateMonth(1);
                else navigateWeek(1);
            });
            todayBtn.addEventListener('click', goToToday);

            monthViewBtn.addEventListener('click', () => {
                viewMode = 'month';
                monthViewBtn.classList.add('active');
                weekViewBtn.classList.remove('active');
                selectedDate = null;
                renderAll();
            });
            weekViewBtn.addEventListener('click', () => {
                viewMode = 'week';
                weekViewBtn.classList.add('active');
                monthViewBtn.classList.remove('active');
                selectedDate = null;
                renderAll();
            });

            // Day click (month view)
            daysGrid.addEventListener('click', (e) => {
                const cell = e.target.closest('.day-cell');
                if (!cell || cell.classList.contains('other-month')) return;
                const dateStr = cell.dataset.date;
                if (dateStr) {
                    selectedDate = new Date(dateStr + 'T00:00:00');
                    renderAll();
                    openAddModal(dateStr);
                }
            });

            // Week row click
            weekViewContainer.addEventListener('click', (e) => {
                const chip = e.target.closest('.week-event-chip');
                if (chip && chip.dataset.eventId) {
                    e.stopPropagation();
                    openEditModal(chip.dataset.eventId);
                    return;
                }
                const row = e.target.closest('.week-row');
                if (row && row.dataset.date) {
                    selectedDate = new Date(row.dataset.date + 'T00:00:00');
                    renderAll();
                    openAddModal(row.dataset.date);
                }
            });

            // Sidebar event list click
            eventList.addEventListener('click', (e) => {
                const deleteBtn = e.target.closest('.delete-event-btn');
                if (deleteBtn && deleteBtn.dataset.deleteId) {
                    e.stopPropagation();
                    const eventId = deleteBtn.dataset.deleteId;
                    if (confirm('Delete this event?')) {
                        events = events.filter(e => e.id !== eventId);
                        saveEvents();
                        renderAll();
                        showToast('Event deleted.');
                    }
                    return;
                }
                const item = e.target.closest('.event-list-item');
                if (item && item.dataset.eventId) {
                    openEditModal(item.dataset.eventId);
                }
            });

            // Modal buttons
            saveEventBtn.addEventListener('click', saveEvent);
            cancelBtn.addEventListener('click', closeModal);
            deleteEventBtn.addEventListener('click', () => {
                if (editingEventId) deleteEvent(editingEventId);
            });
            modalOverlay.addEventListener('click', (e) => {
                if (e.target === modalOverlay) closeModal();
            });

            // Keyboard shortcuts
            document.addEventListener('keydown', (e) => {
                if (modalOverlay.style.display === 'flex') {
                    if (e.key === 'Escape') closeModal();
                    if (e.key === 'Enter') saveEvent();
                    return;
                }
                if (e.key === 'ArrowLeft') {
                    if (viewMode === 'month') navigateMonth(-1);
                    else navigateWeek(-1);
                }
                if (e.key === 'ArrowRight') {
                    if (viewMode === 'month') navigateMonth(1);
                    else navigateWeek(1);
                }
                if (e.key === 't' && !e.ctrlKey && !e.metaKey) goToToday();
                if (e.key === 'n' && !e.ctrlKey && !e.metaKey) {
                    const todayStr = formatDate(new Date());
                    openAddModal(todayStr);
                }
            });

            // --- INIT ---
            loadEvents();
            renderAll();

            console.log('📅 Calendar app ready!');
            console.log('🖱️ Click any day to add an event');
            console.log('⌨️ Keyboard shortcuts: ← → to navigate, T for today, N for new event');
            console.log('💾 Events are saved in your browser\'s local storage');
        })();
    </script>
</body>
</html>
